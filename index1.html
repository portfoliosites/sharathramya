<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharath & Ramya's Wedding</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&family=Montserrat:wght@300&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --cream: #fdfaf5;
            --dark-overlay: rgba(18, 30, 31, 0.85);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* Mobile View Container */
        .mobile-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            position: relative;
            background: url('./Backgroundphoto.jpeg?q=80&w=2070&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            color: var(--cream);
            padding: 40px 20px;
        }

        /* Darkening Layer */
        .mobile-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark-overlay);
            z-index: 1;
            animation: fadeIn 1.5s ease-out forwards;
        }

        .content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        /* Circular Portrait Animation */
        .portrait-frame {
            width: 280px;
            height: 280px;
            margin: 5px auto 5px auto;
            border-radius: 50%;
            border: 2px solid var(--gold);
            position: relative;
            opacity: 0;
            transform: scale(0.8);
            animation: layerAppear 1s ease-out 0.8s forwards;
        }

        .portrait-frame img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .curved-text {
            position: absolute;
            top: -20px;
            width: 100%;
            height: 100%;
            font-family: 'Cinzel', serif;
            font-size: 14px;
            letter-spacing: 2px;
            color: var(--gold);
            animation: rotateText 10s linear infinite;
        }

        /* Typography Styles */
        h2 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: var(--gold);
            /* margin: 20px 0; */
            opacity: 0;
            transform: translateY(20px);
            animation: layerAppear 1s ease-out 1.5s forwards;
        }

        .date-section {
            font-family: 'Cinzel', serif;
            opacity: 0;
            animation: layerAppear 1s ease-out 2s forwards;
        }

        .date-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            font-size: 1.5rem;
            /* margin-bottom: 10px; */
        }

        .location {
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: -20px;
            opacity: 0;
            animation: layerAppear 1s ease-out 2.5s forwards;
        }

        .btn-map {
            display: inline-block;
            margin-top: 25px;
            padding: 6px 12px;
            border: 1px solid var(--gold);
            color: var(--gold);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: 0.3s;
            opacity: 0;
            animation: fadeIn 1s ease-out 3s forwards;
        }

        .btn-map:hover {
            background: var(--gold);
            color: #000;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes layerAppear {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes rotateText {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="mobile-container">
        <div class="content">
            <p style="font-size: 0.9rem; margin-top: 90px; font-style: italic; opacity: 0; animation: fadeIn 1s forwards 3.5s;">
                Your presence will make our day Special & complete!
            </p>
            <div class="portrait-frame">
                <!-- Replace with your actual photo URL -->
                <img src="./centerphoto.jpeg?q=80&w=1974&auto=format&fit=crop" alt="Sharath and Ramya">
            </div>
            <p style="font-size: 0.7rem; letter-spacing: 2px; opacity: 0; animation: fadeIn 1s forwards 0.5s;">
                WITH HEART FULL OF JOY, WE INVITE YOU <br> TO CELEBRATE OUR WEDDING
            </p>

            <h2>Sharath &nbsp; & &nbsp; Ramya</h2>

            <div class="date-section">
                <div class="date-grid">
                    <span>JULY</span>
                    <div class="divider"></div>
                    <span style="font-size: 2.2rem; color: var(--gold);">01</span>
                    <div class="divider"></div>
                    <span>2026</span>
                </div>
                <p>AT 12:30 PM ONWARDS</p>
                <p>White Palace, Mysore</p>
            </div>

            <div class="location">
                <a href="https://maps.app.goo.gl/fCqmxY22y82qP3z77" class="btn-map" target="_blank">View on Google
                    Maps</a>
            </div>

            <!-- <p
                style="font-size: 0.8rem; font-style: italic; opacity: 0; animation: fadeIn 1s forwards 3.5s;">
                Your presence will make our day Special & complete!
            </p> -->
        </div>
    </div>

</body>

</html>
